<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Blog Marketing</title>

    <!-- Google Tag Manager (à remplacer par ton ID) -->
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
    </script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .article {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-primary { background: #007BFF; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; }
    </style>
</head>

<body>

<header>
    <h1>Mon Blog Marketing</h1>
    <p>Etudiante : Oumou Kalsoum  Diakite</p>
    <p>URL : www.monblog-test.fr</p>
</header>

<div class="container">

    <div class="article">
        <h2>Bienvenue sur notre blog</h2>
        <p>Découvrez nos contenus marketing et stratégies digitales.</p>

        <!-- Boutons d'actions -->
        <button class="btn-primary" onclick="newsletter()">S'inscrire à la newsletter</button>
        <button class="btn-success" onclick="devis()">Demander un devis</button>
        <button class="btn-warning" onclick="panier()">Ajouter au panier</button>
    </div>

</div>

<script>
    function newsletter() {
        dataLayer.push({
            event: "sign_up",
            method: "newsletter"
        });
        alert("Inscription newsletter !");
    }

    function devis() {
        dataLayer.push({
            event: "lead_submission",
            form_name: "devis",
            step: 3
        });
        alert("Demande de devis envoyée !");
    }

    function panier() {
        dataLayer.push({
            event: "add_to_cart",
            item_id: "123",
            item_name: "Produit test",
            price: 29.99
        });
        alert("Produit ajouté au panier !");
    }
</script>

</body>
</html>
